<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>.webname {
        text-align: right; /* Center the text */
        margin-top: 20px; /* Adjust as necessary */
      }
      
      .webname h2 {
        font-size: 3em; /* Large, bold text */
        font-family: 'Arial', sans-serif; /* Change to a sleek font or use Google Fonts */
        color: #f54291; /* Eye-catching color */
        text-transform: uppercase; /* Make the text uppercase */
        letter-spacing: 3px; /* Space out the letters for a dramatic effect */
        text-shadow: 2px 2px 5px rgba(0, 0, 0, 0.7); /* Add a subtle shadow for depth */
        background: linear-gradient(90deg, #ff6bcb, #ffe600); /* Gradient effect */
        background-clip: text;
        -webkit-background-clip: text;
        color: transparent; /* Hide original text and show gradient */
        animation: glow 2s infinite; /* Add a glowing effect */
        transition: transform 0.3s ease; /* Smooth hover effect */
        cursor: pointer;
      }
      
      .webname h2:hover {
        transform: scale(1.1); /* Make the text slightly bigger on hover */
      }
      
      @keyframes glow {
        0% {
          text-shadow: 2px 2px 5px rgba(255, 105, 180, 0.5);
        }
        50% {
          text-shadow: 2px 2px 20px rgba(255, 105, 180, 1);
        }
        100% {
          text-shadow: 2px 2px 5px rgba(255, 105, 180, 0.5);
        }
      }
      </style>
</head>
<body>
    <div class="webname">
        <h2>ANIME GATEWAY</h2>
      </div>
      
</body>
</html>
